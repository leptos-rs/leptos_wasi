spin_manifest_version = 2

[application]
name = "counter-p3"
version = "0.1.0"
authors = ["Uriah Galang <codeitlikemiley@gmail.com>"]
description = "A Leptos application running as a WASIp3 Component on Spin"

[[trigger.http]]
route = "/..."
component = "counter-p3"
executor = { type = "http" }

[component.counter-p3]
source = "target/wasm32-wasip2/release/counter_p3.wasm"
allowed_outbound_hosts = []
key_value_stores = ["default"]
[component.counter-p3.build]
command = "WASI_RUNTIME=spin cargo leptos build --release && WASI_RUNTIME=spin LEPTOS_OUTPUT_NAME=counter_p3 cargo build --lib --target wasm32-wasip2 --release --no-default-features --features ssr"
watch = ["src/**/*.rs", "Cargo.toml"]

[[trigger.http]]
route = "/pkg/..."
component = "counter-p3-pkg"

[component.counter-p3-pkg]
source = { url = "https://github.com/fermyon/spin-fileserver/releases/download/v0.1.0/spin_static_fs.wasm", digest = "sha256:96c76d9af86420b39eb6cd7be5550e3cb5d4cc4de572ce0fd1f6a29471536cb4" }
files = [{ source = "target/site/pkg", destination = "/" }]
